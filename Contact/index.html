<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="main.css">
        <script src="https://kit.fontawesome.com/72aca86cc7.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="main-header">
            <div class="logo-container">
                <a href="../index.html" class="cta">YOUTUBE THUMBNAIL</a>
            </div>
            <nav class="main-nav">
                <ul class="list_items">
                    <li class="list_item"><a href="">Contact</a></li>
                    <li class="list_item"><a href="">About-us</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>Write Your Query Below</h1>
            <div class="right">
                <form action="">
                    <label><input class="first" type="text" name="Name" placeholder="Enter your name"></label>
                    <br />
                    <label><input type="email" name="Email-Id" placeholder="Enter email address"></label>
                    <br />
                    <label><input type="text" name="Subject" placeholder="Enter your subject"></label>
                    <br />
                    <label><textarea name="Message" placeholder="Write your query here......"></textarea></label>
                    <br />
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </main>

        <footer>
            <div>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-linkedin"></i>
                <i class="fa-brands fa-twitter"></i>
            </div>
            <h4>Made with <i class="far fa-heart" aria-hidden="true"></i> by Gurnaj Singh</h4>
        </footer>
    </body>
</html>
